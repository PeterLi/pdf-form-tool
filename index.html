<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Form Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-group">
      <label class="btn btn-primary" for="file-input" title="Open a PDF file">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Open PDF
      </label>
      <input type="file" id="file-input" accept=".pdf" hidden>
    </div>

    <div class="toolbar-group toolbar-center">
      <span class="filename" id="filename">No file loaded</span>
    </div>

    <div class="toolbar-group">
      <div class="zoom-group">
        <button id="zoom-out" class="btn btn-icon" title="Zoom out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <span id="zoom-level" class="zoom-level">100%</span>
        <button id="zoom-in" class="btn btn-icon" title="Zoom in">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <button id="zoom-fit" class="btn btn-sm" title="Fit to width">Fit</button>
      </div>

      <div class="toolbar-divider"></div>

      <button id="highlight-toggle" class="btn btn-sm active" title="Toggle form field highlighting">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="8" y1="9" x2="16" y2="9"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="12" y2="17"/>
        </svg>
        Fields
      </button>

      <button id="clear-btn" class="btn btn-sm" title="Clear all form fields">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        Clear
      </button>

      <button id="export-mapping-btn" class="btn btn-sm" title="Export field name mapping as JSON">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
        Export Mapping
      </button>

      <div class="toolbar-divider"></div>

      <button id="mode-toggle-btn" class="btn btn-sm" title="Toggle detection mode: AcroForm fields vs. Visual detection">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
        </svg>
        <span id="mode-label">AcroForm</span>
      </button>

      <button id="detect-fields-btn" class="btn btn-sm" title="Re-run visual field detection" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Re-detect
      </button>

      <button id="download-btn" class="btn btn-primary" title="Download filled PDF" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
      </button>
    </div>
  </div>

  <div id="pdf-viewer-container">
    <div id="pdf-viewer">
      <div class="empty-state" id="empty-state">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <p>Loading sample PDF&hellip;</p>
      </div>
    </div>
  </div>

  <div id="status-bar">
    <span id="status-text">Initializing&hellip;</span>
    <span id="field-info"></span>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
